name: FAQ更新提案の生成

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'ehaco本体のリポジトリ（例: org/ehaco）'
        required: true
        type: string
      base_ref:
        description: '比較元のコミット/タグ（例: v1.0.0）'
        required: true
        type: string
      head_ref:
        description: '比較先のコミット/タグ（例: v1.1.0 or main）'
        required: true
        type: string

jobs:
  generate-faq-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout FAQ repository
        uses: actions/checkout@v4

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          path: source-repo
          fetch-depth: 0

      - name: Generate diff summary
        id: diff
        run: |
          cd source-repo
          echo "## ソースコードの変更差分" > ../diff-summary.md
          echo "" >> ../diff-summary.md
          echo "比較: ${{ inputs.base_ref }} → ${{ inputs.head_ref }}" >> ../diff-summary.md
          echo "" >> ../diff-summary.md
          echo "### 変更されたファイル" >> ../diff-summary.md
          echo '```' >> ../diff-summary.md
          git diff --stat ${{ inputs.base_ref }}..${{ inputs.head_ref }} >> ../diff-summary.md 2>/dev/null || echo "差分の取得に失敗しました" >> ../diff-summary.md
          echo '```' >> ../diff-summary.md
          echo "" >> ../diff-summary.md
          echo "### コミットログ" >> ../diff-summary.md
          echo '```' >> ../diff-summary.md
          git log --oneline ${{ inputs.base_ref }}..${{ inputs.head_ref }} >> ../diff-summary.md 2>/dev/null || echo "ログの取得に失敗しました" >> ../diff-summary.md
          echo '```' >> ../diff-summary.md

      - name: Create FAQ update issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat diff-summary.md)
          gh issue create \
            --title "FAQ更新提案: ${{ inputs.base_ref }} → ${{ inputs.head_ref }}" \
            --body "$BODY

          ---

          ## 対応手順

          1. 上記の差分を確認し、ユーザー向けに影響のある変更を特定してください
          2. 該当するFAQページ（\`docs/participant/\` or \`docs/organizer/\`）を更新してください
          3. PRを作成してレビュー後マージしてください

          ### FAQ更新対象の判断基準

          - 新機能の追加 → 新規FAQページの作成
          - 既存機能の変更 → 該当FAQページの更新
          - UI変更 → スクリーンショットの更新
          - 廃止された機能 → 該当FAQページの削除/更新
          " \
            --label "faq-update"
